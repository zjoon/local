<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div with Inline CSS</title>
</head>
<body>
    <!-- Div with inline CSS for background color -->
    <div style="background-color: #3498db; padding: 20px; border-radius: 10px;">
        <h2>This is a Div with Inline CSS</h2>
        <p>Background color is set using inline CSS style attribute.</p>
    </div>
</body>
</html>
